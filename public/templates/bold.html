<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{name}} — Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0D0D0D; --ink: #F0EDE8; --ink2: #888; --accent: #E63946; --mid: #1A1A1A;
      --font-d: 'Syne', system-ui, sans-serif; --font-b: 'Inter', system-ui, sans-serif;
    }
    body { font-family: var(--font-b); background: var(--bg); color: var(--ink); line-height: 1.6; }
    a { color: inherit; text-decoration: none; }
    nav { display: flex; align-items: center; justify-content: space-between; padding: 1.5rem 5vw; border-bottom: 1px solid rgba(255,255,255,0.08); position: sticky; top: 0; background: rgba(13,13,13,0.95); backdrop-filter: blur(16px); z-index: 10; }
    .nav-name { font-family: var(--font-d); font-size: 1.125rem; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; }
    .nav-links { display: flex; gap: 2rem; font-size: 0.8125rem; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; }
    .nav-links a { color: var(--ink2); transition: color 0.2s; }
    .nav-links a:hover { color: var(--accent); }

    .hero { padding: 10rem 5vw 8rem; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .hero-eyebrow { font-size: 0.75rem; letter-spacing: 0.16em; text-transform: uppercase; color: var(--accent); margin-bottom: 2rem; display: flex; align-items: center; gap: 0.75rem; }
    .hero-eyebrow::before { content: ''; width: 40px; height: 1px; background: var(--accent); }
    .hero-name { font-family: var(--font-d); font-size: clamp(3.5rem, 10vw, 9rem); font-weight: 800; line-height: 0.9; letter-spacing: -0.04em; margin-bottom: 3rem; color: var(--ink); }
    .hero-name span { display: block; color: var(--accent); }
    .hero-bio { font-size: 1.0625rem; color: var(--ink2); max-width: 480px; line-height: 1.75; margin-bottom: 3rem; }
    .hero-cta { display: inline-flex; align-items: center; gap: 0.75rem; background: var(--accent); color: var(--ink); padding: 1rem 2rem; font-family: var(--font-d); font-weight: 700; font-size: 0.875rem; letter-spacing: 0.06em; text-transform: uppercase; transition: transform 0.2s; }
    .hero-cta:hover { transform: translateY(-2px); }

    section { padding: 6rem 5vw; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .section-inner { max-width: 1000px; margin: 0 auto; }
    .section-label { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: var(--accent); margin-bottom: 1rem; display: flex; align-items: center; gap: 0.75rem; }
    .section-label::before { content: ''; width: 24px; height: 1px; background: var(--accent); }
    h2 { font-family: var(--font-d); font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 800; letter-spacing: -0.03em; line-height: 1; margin-bottom: 2.5rem; }

    .services-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1px; background: rgba(255,255,255,0.06); }
    .service-card { background: var(--mid); padding: 2rem; display: flex; flex-direction: column; gap: 1rem; transition: background 0.2s; }
    .service-card:hover { background: rgba(230,57,70,0.1); }
    .service-icon { font-size: 1.5rem; }
    .service-card p { font-size: 0.9375rem; font-weight: 500; }

    .projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1rem; }
    .project-card { overflow: hidden; background: var(--mid); border: 1px solid rgba(255,255,255,0.06); transition: border-color 0.2s; }
    .project-card:hover { border-color: var(--accent); }
    .project-card img { width: 100%; aspect-ratio: 16/10; object-fit: cover; display: block; filter: grayscale(30%); transition: filter 0.3s; }
    .project-card:hover img { filter: none; }
    .project-info { padding: 1rem 1.25rem; }
    .project-info h4 { font-weight: 600; }
    .project-link-card a { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; text-align: center; gap: 0.75rem; min-height: 160px; color: var(--ink2); }
    .project-link-card a:hover { color: var(--accent); }
    .link-icon { font-size: 2rem; }
    .project-link-card p { font-size: 0.75rem; word-break: break-all; color: var(--accent); }

    .about-grid { display: grid; grid-template-columns: 1fr 1.5fr; gap: 4rem; align-items: start; }
    .about-text { font-size: 1.0625rem; color: var(--ink2); line-height: 1.8; }

    .contact-links { display: flex; flex-direction: column; gap: 0.5rem; }
    .social-link { display: inline-flex; align-items: center; gap: 1rem; font-size: 1.0625rem; font-weight: 500; color: var(--ink2); padding: 1rem 0; border-bottom: 1px solid rgba(255,255,255,0.06); transition: color 0.2s, padding-left 0.2s; }
    .social-link:hover { color: var(--accent); padding-left: 0.5rem; }

    footer { text-align: center; padding: 3rem; font-size: 0.8125rem; color: var(--ink2); }
    footer a { color: var(--accent); }
    @media (max-width: 768px) { .about-grid { grid-template-columns: 1fr; } .nav-links { display: none; } }
  </style>
</head>
<body>
  <nav>
    <span class="nav-name">{{name}}</span>
    <div class="nav-links">
      <a href="#about">About</a><a href="#services">Services</a>
      <a href="#projects">Projects</a><a href="#contact">Contact</a>
    </div>
  </nav>

  <div class="hero">
    <div class="hero-eyebrow">{{profession}}</div>
    <h1 class="hero-name">{{name}}</h1>
    <p class="hero-bio">{{bio}}</p>
    <a href="#contact" class="hero-cta">Start a project →</a>
  </div>

  <section id="about"><div class="section-inner">
    <div class="section-label">About</div>
    <div class="about-grid"><h2>The story so far.</h2><p class="about-text">{{bio}}</p></div>
  </div></section>

  <section id="services"><div class="section-inner">
    <div class="section-label">Services</div>
    <h2>What I bring.</h2>
    <div class="services-grid">{{services}}</div>
  </div></section>

  <section id="projects"><div class="section-inner">
    <div class="section-label">Work</div>
    <h2>Selected projects.</h2>
    <div class="projects-grid">{{projects}}</div>
  </div></section>

  <section id="contact"><div class="section-inner">
    <div class="section-label">Contact</div>
    <h2>Let's build something.</h2>
    <div class="contact-links">{{contact}}</div>
  </div></section>

  <footer><p>© {{year}} {{name}} · Built with <a href="/">Portfolia</a></p></footer>
</body>
</html>
