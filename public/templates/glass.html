<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{name}} — Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--gradient:linear-gradient(135deg,#1a1a2e 0%,#16213e 40%,#0f3460 70%,#533483 100%);--glass:rgba(255,255,255,0.07);--glass-border:rgba(255,255,255,0.15);--ink:#F0F0FF;--ink2:rgba(240,240,255,0.6);--accent:#A78BFA;--accent2:#60A5FA;--font:'Space Grotesk',system-ui,sans-serif;}
    body{font-family:var(--font);background:var(--gradient);background-attachment:fixed;color:var(--ink);line-height:1.6;min-height:100vh;}
    a{color:inherit;text-decoration:none;}
    nav{display:flex;align-items:center;justify-content:space-between;padding:1.5rem 5vw;background:rgba(0,0,0,0.2);backdrop-filter:blur(20px);border-bottom:1px solid var(--glass-border);position:sticky;top:0;z-index:10;}
    .nav-name{font-size:1.125rem;font-weight:700;letter-spacing:-0.02em;}
    .nav-links{display:flex;gap:2rem;font-size:0.875rem;font-weight:500;}
    .nav-links a{color:var(--ink2);transition:color 0.2s;}
    .nav-links a:hover{color:var(--accent);}
    .hero{padding:8rem 5vw 6rem;text-align:center;max-width:800px;margin:0 auto;}
    .hero-profession{font-size:0.8rem;font-weight:600;letter-spacing:0.16em;text-transform:uppercase;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:1.5rem;}
    .hero-name{font-size:clamp(3rem,8vw,7rem);font-weight:700;letter-spacing:-0.04em;line-height:0.95;margin-bottom:1.5rem;}
    .hero-bio{font-size:1.0625rem;color:var(--ink2);max-width:500px;margin:0 auto 2.5rem;line-height:1.8;}
    .hero-cta{display:inline-flex;align-items:center;gap:0.5rem;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;padding:0.875rem 2rem;border-radius:100px;font-weight:600;font-size:0.9375rem;transition:transform 0.2s,box-shadow 0.2s;}
    .hero-cta:hover{transform:translateY(-3px);box-shadow:0 16px 48px rgba(167,139,250,0.4);}
    .glass-section{padding:5rem 5vw;}
    .section-inner{max-width:1000px;margin:0 auto;}
    .glass-card{background:var(--glass);border:1px solid var(--glass-border);border-radius:20px;padding:2.5rem;backdrop-filter:blur(20px);margin-bottom:1.5rem;}
    .section-label{font-size:0.7rem;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:0.75rem;}
    h2{font-size:clamp(1.75rem,3.5vw,2.5rem);font-weight:700;letter-spacing:-0.03em;line-height:1.1;margin-bottom:1.5rem;}
    .about-text{font-size:1.0625rem;color:var(--ink2);line-height:1.8;}
    .services-grid{display:flex;flex-wrap:wrap;gap:0.75rem;}
    .service-card{background:rgba(255,255,255,0.05);border:1px solid var(--glass-border);border-radius:12px;padding:1rem 1.5rem;display:flex;align-items:center;gap:0.75rem;backdrop-filter:blur(10px);transition:background 0.2s;}
    .service-card:hover{background:rgba(167,139,250,0.15);}
    .service-icon{font-size:1.125rem;}
    .service-card p{font-size:0.9375rem;font-weight:500;}
    .projects-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem;}
    .project-card{background:var(--glass);border:1px solid var(--glass-border);border-radius:16px;overflow:hidden;backdrop-filter:blur(12px);transition:transform 0.2s,border-color 0.2s;}
    .project-card:hover{transform:translateY(-4px);border-color:var(--accent);}
    .project-card img{width:100%;aspect-ratio:16/10;object-fit:cover;display:block;}
    .project-info{padding:1rem 1.25rem;}
    .project-info h4{font-weight:600;}
    .project-link-card a{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center;gap:0.75rem;min-height:160px;color:var(--ink2);}
    .project-link-card a:hover{color:var(--accent);}
    .link-icon{font-size:2rem;}
    .project-link-card p{font-size:0.75rem;word-break:break-all;color:var(--accent);}
    .contact-links{display:flex;flex-direction:column;gap:0.75rem;}
    .social-link{display:inline-flex;align-items:center;gap:1rem;font-size:1rem;font-weight:500;color:var(--ink);padding:1rem 1.25rem;background:var(--glass);border:1px solid var(--glass-border);border-radius:12px;transition:background 0.2s,border-color 0.2s;backdrop-filter:blur(12px);}
    .social-link:hover{background:rgba(167,139,250,0.15);border-color:var(--accent);}
    footer{text-align:center;padding:3rem;font-size:0.8125rem;color:var(--ink2);}
    footer a{color:var(--accent);}
    @media(max-width:768px){.nav-links{display:none;}}
  </style>
</head>
<body>
  <nav>
    <span class="nav-name">{{name}}</span>
    <div class="nav-links"><a href="#about">About</a><a href="#services">Services</a><a href="#projects">Work</a><a href="#contact">Contact</a></div>
  </nav>
  <div class="hero">
    <div class="hero-profession">{{profession}}</div>
    <h1 class="hero-name">{{name}}</h1>
    <p class="hero-bio">{{bio}}</p>
    <a href="#contact" class="hero-cta">Let's Connect ✨</a>
  </div>
  <div class="glass-section" id="about"><div class="section-inner"><div class="glass-card"><div class="section-label">About</div><h2>Who I am.</h2><p class="about-text">{{bio}}</p></div></div></div>
  <div class="glass-section" id="services"><div class="section-inner"><div class="glass-card"><div class="section-label">Services</div><h2>What I do.</h2><div class="services-grid">{{services}}</div></div></div></div>
  <div class="glass-section" id="projects"><div class="section-inner"><div class="glass-card"><div class="section-label">Work</div><h2>My projects.</h2><div class="projects-grid">{{projects}}</div></div></div></div>
  <div class="glass-section" id="contact"><div class="section-inner"><div class="glass-card"><div class="section-label">Contact</div><h2>Get in touch.</h2><div class="contact-links">{{contact}}</div></div></div></div>
  <footer><p>© {{year}} {{name}} · <a href="/">Built with Portfolia</a></p></footer>
</body>
</html>
