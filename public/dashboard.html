<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Portfolia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--cream:#F5F0E8;--ink:#1A1612;--ink2:#6B6460;--accent:#C84B2F;--border:rgba(26,22,18,0.12);--white:#fff;--font-d:'DM Serif Display',Georgia,serif;--font-b:'DM Sans',system-ui,sans-serif;}
    body{font-family:var(--font-b);background:var(--cream);color:var(--ink);min-height:100vh;}
    a{color:inherit;text-decoration:none;}
    nav{display:flex;align-items:center;justify-content:space-between;padding:1.25rem 3rem;border-bottom:1px solid var(--border);background:rgba(245,240,232,0.9);backdrop-filter:blur(12px);position:sticky;top:0;z-index:10;}
    .nav-logo{font-family:var(--font-d);font-size:1.375rem;letter-spacing:-0.02em;}
    .nav-right{display:flex;align-items:center;gap:1rem;}
    .nav-right a{font-size:0.875rem;font-weight:500;color:var(--ink2);transition:color 0.2s;}
    .nav-right a:hover{color:var(--ink);}
    .btn{display:inline-flex;align-items:center;gap:0.375rem;font-family:var(--font-b);font-size:0.875rem;font-weight:600;padding:0.625rem 1.25rem;border-radius:100px;cursor:pointer;transition:all 0.2s;border:none;}
    .btn-dark{background:var(--ink);color:var(--cream);}
    .btn-dark:hover{background:var(--accent);}
    .btn-outline{background:none;border:1.5px solid var(--border);color:var(--ink);}
    .btn-outline:hover{background:var(--ink);color:var(--cream);border-color:var(--ink);}
    .btn-danger{background:none;border:1.5px solid #e74c3c;color:#e74c3c;}
    .btn-danger:hover{background:#e74c3c;color:#fff;}

    .dash-main{max-width:1100px;margin:0 auto;padding:3rem 2rem;}
    .dash-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:3rem;flex-wrap:wrap;gap:1.5rem;}
    .dash-greeting{font-family:var(--font-d);font-size:clamp(1.75rem,4vw,3rem);letter-spacing:-0.03em;line-height:1.1;}
    .dash-greeting span{color:var(--accent);font-style:italic;}
    .dash-profession{color:var(--ink2);margin-top:0.5rem;font-size:1.0625rem;}
    .dash-actions{display:flex;gap:0.75rem;flex-wrap:wrap;}

    .dash-grid{display:grid;grid-template-columns:2fr 1fr;gap:2rem;}

    /* Portfolio Preview Card */
    .card{background:var(--white);border:1px solid var(--border);border-radius:16px;overflow:hidden;}
    .card-header{padding:1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
    .card-title{font-weight:600;font-size:1.0625rem;}
    .card-body{padding:1.5rem;}

    .portfolio-preview-frame{width:100%;height:300px;border-radius:10px;overflow:hidden;border:1px solid var(--border);background:#f9f9f9;position:relative;}
    .portfolio-preview-frame iframe{width:100%;height:100%;border:none;transform-origin:top left;pointer-events:none;}
    .portfolio-preview-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(245,240,232,0.8);backdrop-filter:blur(2px);}
    .view-live-btn{display:inline-flex;align-items:center;gap:0.5rem;background:var(--ink);color:var(--cream);padding:0.875rem 1.75rem;border-radius:100px;font-weight:600;transition:background 0.2s;}
    .view-live-btn:hover{background:var(--accent);}

    .portfolio-url-box{margin-top:1rem;background:var(--cream);border-radius:8px;padding:0.875rem 1.125rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;}
    .portfolio-url-text{font-family:monospace;font-size:0.8125rem;color:var(--accent);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .copy-btn{font-family:var(--font-b);font-size:0.75rem;font-weight:600;background:none;border:1.5px solid var(--border);border-radius:100px;padding:0.375rem 0.875rem;cursor:pointer;transition:all 0.2s;flex-shrink:0;}
    .copy-btn:hover{background:var(--ink);color:var(--cream);border-color:var(--ink);}

    /* Info Card */
    .info-list{display:flex;flex-direction:column;gap:0;}
    .info-item{padding:0.875rem 0;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:0.25rem;}
    .info-item:last-child{border-bottom:none;}
    .info-key{font-size:0.7rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink2);}
    .info-val{font-size:0.9375rem;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

    /* Template badge */
    .template-badge{display:inline-flex;align-items:center;gap:0.375rem;background:rgba(200,75,47,0.1);color:var(--accent);padding:0.25rem 0.75rem;border-radius:100px;font-size:0.75rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;}
    .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);}

    /* Services list */
    .services-tags{display:flex;flex-wrap:wrap;gap:0.5rem;margin-top:0.5rem;}
    .service-tag{background:var(--cream);border:1px solid var(--border);border-radius:100px;padding:0.25rem 0.875rem;font-size:0.8125rem;font-weight:500;}

    /* Edit modal */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(26,22,18,0.6);backdrop-filter:blur(8px);z-index:100;align-items:center;justify-content:center;padding:2rem;}
    .modal-overlay.open{display:flex;}
    .modal{background:var(--white);border-radius:20px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;}
    .modal-header{padding:1.5rem 2rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
    .modal-title{font-family:var(--font-d);font-size:1.5rem;letter-spacing:-0.02em;}
    .modal-close{background:none;border:none;font-size:1.5rem;cursor:pointer;color:var(--ink2);line-height:1;padding:0.25rem;}
    .modal-body{padding:2rem;}
    .field-group{margin-bottom:1.25rem;}
    .field-label{display:block;font-size:0.75rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink2);margin-bottom:0.5rem;}
    .field-input{width:100%;font-family:var(--font-b);font-size:0.9375rem;border:1.5px solid var(--border);border-radius:10px;padding:0.75rem 1rem;outline:none;transition:border-color 0.2s;background:var(--cream);}
    .field-input:focus{border-color:var(--accent);}
    .field-textarea{min-height:100px;resize:vertical;}
    .modal-footer{padding:1.5rem 2rem;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:0.75rem;}

    .toast{position:fixed;bottom:2rem;right:2rem;background:var(--ink);color:var(--cream);padding:0.875rem 1.5rem;border-radius:100px;font-size:0.9rem;font-weight:500;z-index:200;transform:translateY(100px);opacity:0;transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);}
    .toast.show{transform:translateY(0);opacity:1;}

    .loading{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.7s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg)}}

    @media(max-width:900px){.dash-grid{grid-template-columns:1fr;}}
    @media(max-width:600px){nav{padding:1rem 1.25rem;}.dash-main{padding:2rem 1.25rem;}}
  </style>
</head>
<body>
  <nav>
    <a href="/" class="nav-logo">Portfolia</a>
    <div class="nav-right">
      <a href="/" >← Home</a>
      <a href="/create" class="btn btn-dark">New Portfolio</a>
    </div>
  </nav>

  <main class="dash-main">
    <div id="loadingState" style="text-align:center;padding:6rem 2rem;color:var(--ink2);">Loading your portfolio...</div>
    <div id="dashContent" style="display:none;">
      <div class="dash-header">
        <div>
          <h1 class="dash-greeting">Welcome back, <span id="displayName">—</span></h1>
          <p class="dash-profession" id="displayProfession">—</p>
        </div>
        <div class="dash-actions">
          <button class="btn btn-outline" onclick="openEditModal()">✏️ Edit Details</button>
          <a id="viewPortfolioLink" href="#" target="_blank" class="btn btn-dark">🔗 View Portfolio</a>
        </div>
      </div>

      <div class="dash-grid">
        <!-- Left: Preview -->
        <div>
          <div class="card">
            <div class="card-header">
              <span class="card-title">Portfolio Preview</span>
              <div class="template-badge"><span class="dot"></span><span id="templateBadge">—</span></div>
            </div>
            <div class="card-body">
              <div class="portfolio-preview-frame">
                <div class="portfolio-preview-overlay">
                  <a id="viewLiveBtn" href="#" target="_blank" class="view-live-btn">View Live Portfolio →</a>
                </div>
              </div>
              <div class="portfolio-url-box">
                <span class="portfolio-url-text" id="portfolioUrlText">—</span>
                <button class="copy-btn" onclick="copyUrl()">Copy</button>
              </div>
            </div>
          </div>
        </div>

        <!-- Right: Info -->
        <div style="display:flex;flex-direction:column;gap:1.25rem;">
          <div class="card">
            <div class="card-header"><span class="card-title">Details</span></div>
            <div class="card-body">
              <div class="info-list">
                <div class="info-item"><span class="info-key">Name</span><span class="info-val" id="infoName">—</span></div>
                <div class="info-item"><span class="info-key">Profession</span><span class="info-val" id="infoProfession">—</span></div>
                <div class="info-item"><span class="info-key">Email</span><span class="info-val" id="infoEmail">—</span></div>
                <div class="info-item"><span class="info-key">Created</span><span class="info-val" id="infoCreated">—</span></div>
                <div class="info-item"><span class="info-key">Last Updated</span><span class="info-val" id="infoUpdated">—</span></div>
              </div>
            </div>
          </div>
          <div class="card">
            <div class="card-header"><span class="card-title">Services</span></div>
            <div class="card-body">
              <div class="services-tags" id="servicesTags">—</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Edit Modal -->
  <div class="modal-overlay" id="editModal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">Edit Portfolio</span>
        <button class="modal-close" onclick="closeEditModal()">×</button>
      </div>
      <div class="modal-body">
        <div class="field-group">
          <label class="field-label" for="editName">Full Name</label>
          <input type="text" id="editName" class="field-input" placeholder="Your name" />
        </div>
        <div class="field-group">
          <label class="field-label" for="editProfession">Profession</label>
          <input type="text" id="editProfession" class="field-input" placeholder="Your profession" />
        </div>
        <div class="field-group">
          <label class="field-label" for="editBio">Bio</label>
          <textarea id="editBio" class="field-input field-textarea" placeholder="A short bio..."></textarea>
        </div>
        <div class="field-group">
          <label class="field-label" for="editServices">Services (one per line)</label>
          <textarea id="editServices" class="field-input field-textarea" placeholder="Design&#10;Branding&#10;Development"></textarea>
        </div>
        <div class="field-group">
          <label class="field-label" for="editEmail">Email</label>
          <input type="email" id="editEmail" class="field-input" placeholder="hello@you.com" />
        </div>
        <div class="field-group">
          <label class="field-label" for="editTemplate">Template</label>
          <select id="editTemplate" class="field-input">
            <option value="minimal">Minimal</option>
            <option value="bold">Bold</option>
            <option value="warm">Warm</option>
            <option value="editorial">Editorial</option>
            <option value="glass">Glass</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeEditModal()">Cancel</button>
        <button class="btn btn-dark" id="saveBtn" onclick="saveChanges()">Save & Regenerate ✨</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const username = window.location.pathname.split('/').pop();
    let userData = null;

    async function loadDashboard() {
      try {
        const res = await fetch(`/api/user/${username}`);
        if (!res.ok) { window.location.href = '/'; return; }
        userData = await res.json();
        renderDashboard();
      } catch {
        window.location.href = '/';
      }
    }

    function renderDashboard() {
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('dashContent').style.display = 'block';

      const portfolioUrl = `/portfolio/${userData.username}.html`;
      const fullUrl = window.location.origin + portfolioUrl;

      document.getElementById('displayName').textContent = userData.name;
      document.getElementById('displayProfession').textContent = userData.profession;
      document.getElementById('templateBadge').textContent = capitalize(userData.template);
      document.getElementById('portfolioUrlText').textContent = fullUrl;
      document.getElementById('viewPortfolioLink').href = portfolioUrl;
      document.getElementById('viewLiveBtn').href = portfolioUrl;
      document.getElementById('infoName').textContent = userData.name;
      document.getElementById('infoProfession').textContent = userData.profession;
      document.getElementById('infoEmail').textContent = userData.email || 'Not provided';
      document.getElementById('infoCreated').textContent = formatDate(userData.createdAt);
      document.getElementById('infoUpdated').textContent = formatDate(userData.updatedAt);

      const tags = document.getElementById('servicesTags');
      tags.innerHTML = (userData.services || []).map(s =>
        `<span class="service-tag">${s}</span>`
      ).join('') || 'No services added.';
    }

    function openEditModal() {
      document.getElementById('editName').value = userData.name || '';
      document.getElementById('editProfession').value = userData.profession || '';
      document.getElementById('editBio').value = userData.bio || '';
      document.getElementById('editServices').value = (userData.services || []).join('\n');
      document.getElementById('editEmail').value = userData.email || '';
      document.getElementById('editTemplate').value = userData.template || 'minimal';
      document.getElementById('editModal').classList.add('open');
    }

    function closeEditModal() {
      document.getElementById('editModal').classList.remove('open');
    }

    async function saveChanges() {
      const btn = document.getElementById('saveBtn');
      btn.innerHTML = '<span class="loading"></span> Regenerating...';
      btn.disabled = true;

      try {
        const formData = new FormData();
        formData.append('name', document.getElementById('editName').value.trim());
        formData.append('profession', document.getElementById('editProfession').value.trim());
        formData.append('bio', document.getElementById('editBio').value.trim());
        formData.append('services', document.getElementById('editServices').value.trim());
        formData.append('email', document.getElementById('editEmail').value.trim());
        formData.append('template', document.getElementById('editTemplate').value);

        const res = await fetch(`/api/user/${username}`, { method: 'PUT', body: formData });
        const data = await res.json();

        if (data.success) {
          const updatedRes = await fetch(`/api/user/${username}`);
          userData = await updatedRes.json();
          renderDashboard();
          closeEditModal();
          showToast('Portfolio updated! ✨');
        }
      } catch {
        showToast('Error saving changes.');
      } finally {
        btn.innerHTML = 'Save & Regenerate ✨';
        btn.disabled = false;
      }
    }

    function copyUrl() {
      const url = window.location.origin + `/portfolio/${username}.html`;
      navigator.clipboard.writeText(url).then(() => showToast('Link copied! 🔗'));
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    function capitalize(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : ''; }
    function formatDate(d) {
      if (!d) return '—';
      return new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    // Close modal on overlay click
    document.getElementById('editModal').addEventListener('click', function(e) {
      if (e.target === this) closeEditModal();
    });

    loadDashboard();
  </script>
</body>
</html>
