<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found — Portfolia</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/main.css" />
  <style>
    body { display: flex; flex-direction: column; min-height: 100vh; align-items: center; justify-content: center; text-align: center; padding: 2rem; }

<body>
  <div class="err-num">404</div>
  <h1>Page not found</h1>

  <div style="display:flex; gap:1rem; justify-content:center">
    <a href="/" class="btn btn-primary">Go Home</a>
    <a href="/create" class="btn btn-outline">Create Portfolio</a>

</html>
