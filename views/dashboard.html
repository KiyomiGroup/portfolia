<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Portfolia</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/main.css" />
  <style>
    .dashboard-layout {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }
    .dash-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1.5rem 5vw;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .dash-main {
      padding: 3rem 5vw;
      max-width: 1000px;
      margin: 0 auto;
      width: 100%;
    }
    .dash-greeting {
      margin-bottom: 3rem;
    }
    .dash-greeting h1 {
      font-family: var(--ff-display);
      font-size: clamp(1.8rem, 3vw, 2.5rem);
      font-weight: 400;
      margin-bottom: 0.5rem;
    }
    .dash-greeting p { color: var(--muted); }
    .dash-cards {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 2rem;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2rem;
    }
    .card h2 {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.5rem;
    }
    .portfolio-preview-frame {
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      aspect-ratio: 16/10;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.25rem;
      position: relative;
    }
    .portfolio-preview-frame iframe {
      width: 100%;
      height: 100%;
      border: none;
      transform-origin: top left;
    }
    .portfolio-url-row {
      display: flex;
      gap: 0.75rem;
      align-items: center;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.75rem 1rem;
      margin-bottom: 1.25rem;
    }
    .portfolio-url-row span {
      flex: 1;
      font-size: 0.85rem;
      color: var(--muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .portfolio-url-row a {
      font-size: 0.82rem;
      color: var(--primary);
      text-decoration: none;
      font-weight: 500;
      flex-shrink: 0;
    }
    .action-row {
      display: flex;
      gap: 0.75rem;
    }
    .stat-list { display: flex; flex-direction: column; gap: 1.25rem; }
    .stat-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 1.25rem;
      border-bottom: 1px solid var(--border);
    }
    .stat-item:last-child { border-bottom: none; padding-bottom: 0; }
    .stat-label { font-size: 0.85rem; color: var(--muted); }
    .stat-value { font-weight: 600; font-size: 0.95rem; }
    .stat-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: rgba(16,185,129,0.1);
      color: #10b981;
      border-radius: 100px;
      padding: 0.25rem 0.75rem;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .edit-fields { display: flex; flex-direction: column; gap: 1rem; margin-bottom: 1.5rem; }
    .edit-field label {
      display: block;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }
    .edit-field input, .edit-field textarea, .edit-field select {
      width: 100%;
      padding: 0.75rem 1rem;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-family: var(--ff-body);
      font-size: 0.9rem;
      resize: vertical;
      transition: border-color 0.2s;
    }
    .edit-field input:focus, .edit-field textarea:focus, .edit-field select:focus {
      outline: none;
      border-color: var(--primary);
    }
    .not-found {
      text-align: center;
      padding: 5rem 2rem;
    }
    .not-found h2 { font-family: var(--ff-display); font-size: 2rem; margin-bottom: 1rem; }
    .not-found p { color: var(--muted); margin-bottom: 2rem; }
    .loading-state {
      text-align: center;
      padding: 5rem 2rem;
      color: var(--muted);
      font-size: 1.1rem;
    }
    @media (max-width: 768px) {
      .dash-cards { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div class="dashboard-layout">
    <header class="dash-header">
      <a href="/" class="brand">
        <span class="brand-icon">◈</span> Portfolia
      </a>
      <a href="/create" class="btn btn-primary btn-sm">+ New Portfolio</a>
    </header>

    <main class="dash-main">

      <!-- Loading -->
      <div class="loading-state" id="loadingState">
        ⟳ Loading your portfolio...
      </div>

      <!-- Not Found -->
      <div class="not-found" id="notFoundState" style="display:none">
        <h2>Portfolio not found</h2>
        <p>The portfolio you're looking for doesn't exist or the link may have expired.</p>
        <a href="/create" class="btn btn-primary">Create a Portfolio</a>
      </div>

      <!-- Dashboard Content -->
      <div id="dashboardContent" style="display:none">
        <div class="dash-greeting">
          <h1>Welcome back, <em id="userName"></em> 👋</h1>
          <p id="userProfession"></p>
        </div>

        <div class="dash-cards">

          <!-- Portfolio Preview Card -->
          <div class="card">
            <h2>Your Portfolio</h2>
            <div class="portfolio-preview-frame">
              <iframe id="portfolioFrame" title="Portfolio Preview" sandbox="allow-scripts allow-same-origin"></iframe>
            </div>
            <div class="portfolio-url-row">
              <span id="portfolioUrlDisplay"></span>
              <a href="#" id="portfolioLink" target="_blank">Open ↗</a>
            </div>
            <div class="action-row">
              <button class="btn btn-primary" id="regenerateBtn">↺ Regenerate</button>
              <button class="btn btn-outline" id="copyLinkBtn">Copy Link</button>
              <button class="btn btn-ghost" id="deleteBtn" style="color: #ef4444;">Delete</button>
            </div>
          </div>

          <!-- Stats Card -->
          <div>
            <div class="card" style="margin-bottom: 1.5rem;">
              <h2>Details</h2>
              <div class="stat-list">
                <div class="stat-item">
                  <span class="stat-label">Status</span>
                  <span class="stat-badge">● Live</span>
                </div>
                <div class="stat-item">
                  <span class="stat-label">Template</span>
                  <span class="stat-value" id="statTemplate">—</span>
                </div>
                <div class="stat-item">
                  <span class="stat-label">Services</span>
                  <span class="stat-value" id="statServices">0</span>
                </div>
                <div class="stat-item">
                  <span class="stat-label">Projects</span>
                  <span class="stat-value" id="statProjects">0</span>
                </div>
                <div class="stat-item">
                  <span class="stat-label">Created</span>
                  <span class="stat-value" id="statCreated">—</span>
                </div>
              </div>
            </div>

            <!-- Quick Edit Card -->
            <div class="card">
              <h2>Quick Edit</h2>
              <div class="edit-fields">
                <div class="edit-field">
                  <label>Bio</label>
                  <textarea id="edit-bio" rows="3"></textarea>
                </div>
                <div class="edit-field">
                  <label>Email</label>
                  <input type="email" id="edit-email" />
                </div>
                <div class="edit-field">
                  <label>Template</label>
                  <select id="edit-template">
                    <option value="template1">Midnight Modern</option>
                    <option value="template2">Fresh Light</option>
                    <option value="template3">Neon Grid</option>
                    <option value="template4">Soft Studio</option>
                    <option value="template5">Bold Serif</option>
                  </select>
                </div>
              </div>
              <button class="btn btn-primary" id="saveEditBtn" style="width:100%">Save & Regenerate</button>
            </div>
          </div>

        </div>
      </div>

    </main>
  </div>

  <script src="/js/dashboard.js"></script>
</body>
</html>
